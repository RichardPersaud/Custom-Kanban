<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KanbanFlow - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-body: #020617;
            --bg-card: #1e293b;
            --border-color: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
        }

        body {
            background: linear-gradient(135deg, #020617 0%, #1e293b 100%);
            min-height: 100vh;
        }

        .auth-card {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(51, 65, 85, 0.5);
        }

        .tab-active {
            color: #3b82f6;
            border-bottom: 2px solid #3b82f6;
        }

        .tab-inactive {
            color: #94a3b8;
            border-bottom: 2px solid transparent;
        }

        .tab-inactive:hover {
            color: #f1f5f9;
        }

        .input-field {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .google-btn {
            background: #ffffff;
            color: #374151;
            border: 1px solid #e5e7eb;
            transition: all 0.2s ease;
        }

        .google-btn:hover {
            background: #f9fafb;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #64748b;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #334155;
        }

        .divider::before {
            margin-right: 1rem;
        }

        .divider::after {
            margin-left: 1rem;
        }

        .error-message {
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Success animation */
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-500/30">
                <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">KanbanFlow</h1>
            <p class="text-gray-400">Organize your work efficiently</p>
        </div>

        <!-- Auth Card -->
        <div class="auth-card rounded-2xl p-8 shadow-2xl">
            <!-- Tabs -->
            <div class="flex mb-6">
                <button onclick="switchTab('login')" id="loginTab" class="flex-1 py-3 text-sm font-medium tab-active transition-colors">
                    Sign In
                </button>
                <button onclick="switchTab('register')" id="registerTab" class="flex-1 py-3 text-sm font-medium tab-inactive transition-colors">
                    Sign Up
                </button>
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="hidden mb-4 p-3 bg-red-500/10 border border-red-500/30 rounded-lg text-red-400 text-sm error-message"></div>

            <!-- Success Message -->
            <div id="successMessage" class="hidden mb-4 p-3 bg-green-500/10 border border-green-500/30 rounded-lg text-green-400 text-sm"></div>

            <!-- Login Form -->
            <form id="loginForm" class="fade-in">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1.5">Email</label>
                        <input type="email" id="loginEmail" required
                               class="input-field w-full px-4 py-3 rounded-lg text-white placeholder-gray-500"
                               placeholder="you@example.com">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1.5">Password</label>
                        <input type="password" id="loginPassword" required
                               class="input-field w-full px-4 py-3 rounded-lg text-white placeholder-gray-500"
                               placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" id="loginBtn" class="btn-primary w-full mt-6 py-3 rounded-lg text-white font-medium flex items-center justify-center gap-2">
                    <span>Sign In</span>
                </button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="hidden fade-in">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1.5">Username</label>
                        <input type="text" id="registerUsername" required
                               class="input-field w-full px-4 py-3 rounded-lg text-white placeholder-gray-500"
                               placeholder="johndoe"
                               pattern="[a-zA-Z0-9_]{3,50}"
                               title="3-50 characters, letters, numbers, underscores only">
                        <p class="text-xs text-gray-500 mt-1">3-50 characters, letters, numbers, underscores</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1.5">Email</label>
                        <input type="email" id="registerEmail" required
                               class="input-field w-full px-4 py-3 rounded-lg text-white placeholder-gray-500"
                               placeholder="you@example.com">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1.5">Password</label>
                        <input type="password" id="registerPassword" required minlength="8"
                               class="input-field w-full px-4 py-3 rounded-lg text-white placeholder-gray-500"
                               placeholder="••••••••">
                        <p class="text-xs text-gray-500 mt-1">At least 8 characters</p>
                    </div>
                </div>

                <button type="submit" id="registerBtn" class="btn-primary w-full mt-6 py-3 rounded-lg text-white font-medium flex items-center justify-center gap-2">
                    <span>Create Account</span>
                </button>
            </form>

            <!-- Divider -->
            <div class="divider my-6 text-sm">
                or continue with
            </div>

            <!-- Google Sign-In -->
            <div class="flex justify-center" id="googleSignInSection">
                <div id="g_id_onload"></div>
                <div id="g_id_signin"></div>
                <div id="googleNotConfigured" class="hidden text-sm text-gray-500">
                    Google Sign-In not configured
                </div>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-gray-500 text-sm mt-8">
            By using KanbanFlow, you agree to our Terms and Privacy Policy
        </p>
    </div>

    <script>
        // Store invitation token if present (do this FIRST before auth check)
        const urlParams = new URLSearchParams(window.location.search);
        const inviteToken = urlParams.get('invite_token');
        const inviteBoardId = urlParams.get('board_id');
        if (inviteToken && inviteBoardId) {
            sessionStorage.setItem('pendingInviteToken', inviteToken);
            sessionStorage.setItem('pendingInviteBoardId', inviteBoardId);
        }

        // Check if already logged in
        fetch('/api/auth/me')
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    // If already logged in and have invite token, redirect with it
                    if (inviteToken && inviteBoardId) {
                        window.location.href = `/?invite_token=${inviteToken}&board_id=${inviteBoardId}`;
                    } else {
                        window.location.href = '/';
                    }
                }
            })
            .catch(() => {});

        // Load Google Sign-In configuration
        let googleClientId = null;

        async function loadGoogleConfig() {
            try {
                const response = await fetch('/api/auth/google-config.php');
                const data = await response.json();

                if (data.success && data.configured && data.client_id) {
                    googleClientId = data.client_id;
                    initGoogleSignIn();
                } else {
                    // Show not configured message
                    document.getElementById('googleNotConfigured').classList.remove('hidden');
                    document.getElementById('g_id_signin').classList.add('hidden');
                }
            } catch (err) {
                console.error('Failed to load Google config:', err);
                document.getElementById('googleNotConfigured').classList.remove('hidden');
                document.getElementById('g_id_signin').classList.add('hidden');
            }
        }

        function initGoogleSignIn() {
            // Create the Google Sign-In script
            const script = document.createElement('script');
            script.src = 'https://accounts.google.com/gsi/client';
            script.async = true;
            script.defer = true;
            script.onload = () => {
                // Initialize Google Sign-In
                google.accounts.id.initialize({
                    client_id: googleClientId,
                    callback: handleGoogleCredentialResponse,
                    auto_select: false
                });

                // Render the button
                google.accounts.id.renderButton(
                    document.getElementById('g_id_signin'),
                    {
                        type: 'standard',
                        size: 'large',
                        theme: 'outline',
                        text: 'continue_with',
                        shape: 'pill',
                        logo_alignment: 'left'
                    }
                );
            };
            document.head.appendChild(script);
        }

        // Load Google config on page load
        loadGoogleConfig();

        // Tab switching
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');

            hideMessages();

            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                loginTab.classList.add('tab-active');
                loginTab.classList.remove('tab-inactive');
                registerTab.classList.add('tab-inactive');
                registerTab.classList.remove('tab-active');
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                loginTab.classList.add('tab-inactive');
                loginTab.classList.remove('tab-active');
                registerTab.classList.add('tab-active');
                registerTab.classList.remove('tab-inactive');
            }
        }

        // Show error message
        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.remove('hidden');
            document.getElementById('successMessage').classList.add('hidden');
        }

        // Show success message
        function showSuccess(message) {
            const successEl = document.getElementById('successMessage');
            successEl.textContent = message;
            successEl.classList.remove('hidden');
            document.getElementById('errorMessage').classList.add('hidden');
        }

        // Hide messages
        function hideMessages() {
            document.getElementById('errorMessage').classList.add('hidden');
            document.getElementById('successMessage').classList.add('hidden');
        }

        // Set loading state
        function setLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = '<div class="loading-spinner mx-auto"></div>';
            } else {
                btn.disabled = false;
                btn.innerHTML = btnId === 'loginBtn' ? '<span>Sign In</span>' : '<span>Create Account</span>';
            }
        }

        // Login form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();
            setLoading('loginBtn', true);

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    // Check for pending invitation
                    const pendingToken = sessionStorage.getItem('pendingInviteToken');
                    const pendingBoardId = sessionStorage.getItem('pendingInviteBoardId');
                    if (pendingToken && pendingBoardId) {
                        window.location.href = `/?invite_token=${pendingToken}&board_id=${pendingBoardId}`;
                        sessionStorage.removeItem('pendingInviteToken');
                        sessionStorage.removeItem('pendingInviteBoardId');
                    } else {
                        window.location.href = '/';
                    }
                } else {
                    showError(data.error || 'Login failed');
                    setLoading('loginBtn', false);
                }
            } catch (err) {
                showError('Network error. Please try again.');
                setLoading('loginBtn', false);
            }
        });

        // Register form submission
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();
            setLoading('registerBtn', true);

            const username = document.getElementById('registerUsername').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;

            // Validate username
            if (!/^[a-zA-Z0-9_]{3,50}$/.test(username)) {
                showError('Username must be 3-50 characters with only letters, numbers, and underscores');
                setLoading('registerBtn', false);
                return;
            }

            // Validate password
            if (password.length < 8) {
                showError('Password must be at least 8 characters');
                setLoading('registerBtn', false);
                return;
            }

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (data.success) {
                    // Check for pending invitation
                    const pendingToken = sessionStorage.getItem('pendingInviteToken');
                    const pendingBoardId = sessionStorage.getItem('pendingInviteBoardId');
                    if (pendingToken && pendingBoardId) {
                        window.location.href = `/?invite_token=${pendingToken}&board_id=${pendingBoardId}`;
                        sessionStorage.removeItem('pendingInviteToken');
                        sessionStorage.removeItem('pendingInviteBoardId');
                    } else {
                        showSuccess('Account created! Redirecting...');
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 1000);
                    }
                } else {
                    showError(data.error || 'Registration failed');
                    setLoading('registerBtn', false);
                }
            } catch (err) {
                showError('Network error. Please try again.');
                setLoading('registerBtn', false);
            }
        });

        // Google OAuth callback
        async function handleGoogleCredentialResponse(response) {
            hideMessages();

            try {
                const res = await fetch('/api/auth/google', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ credential: response.credential })
                });

                const data = await res.json();

                if (data.success) {
                    window.location.href = '/';
                } else {
                    showError(data.error || 'Google sign-in failed');
                }
            } catch (err) {
                showError('Network error. Please try again.');
            }
        }
    </script>
</body>
</html>
