name: kanban-app
services:
    kanban:
        cpu_shares: 90
        command: []
        container_name: kanban-app
        deploy:
            resources:
                limits:
                    memory: "67194847232"
        hostname: kanban-app
        image: nginx:alpine
        networks:
            kanban-network: null
        ports:
            - mode: ingress
              target: 80
              published: "3001"
              protocol: tcp
        restart: unless-stopped
        volumes:
            - type: bind
              source: /DATA/AppData/kanban-app/www
              target: /usr/share/nginx/html
              read_only: true
              bind:
                create_host_path: true
            - type: bind
              source: /DATA/AppData/kanban-app/nginx.conf
              target: /etc/nginx/conf.d/default.conf
              read_only: true
              bind:
                create_host_path: true
        depends_on:
            - php

    php:
        container_name: kanban-php
        build: .
        restart: unless-stopped
        networks:
            - kanban-network
        environment:
            - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
            # SMTP Configuration for email notifications
            - SMTP_HOST=${SMTP_HOST:-}
            - SMTP_PORT=${SMTP_PORT:-587}
            - SMTP_USER=${SMTP_USER:-}
            - SMTP_PASS=${SMTP_PASS:-}
            - SMTP_FROM=${SMTP_FROM:-}
            - SMTP_FROM_NAME=${SMTP_FROM_NAME:-KanbanFlow}
        volumes:
            - type: bind
              source: /DATA/AppData/kanban-app/www
              target: /var/www/html
              bind:
                create_host_path: true
        depends_on:
            - db

    websocket:
        container_name: kanban-websocket
        build: .
        restart: unless-stopped
        command: php /app/websocket-server.php
        networks:
            - kanban-network
        volumes:
            - type: bind
              source: /DATA/AppData/kanban-app/www
              target: /var/www/html
              bind:
                create_host_path: true
            - type: bind
              source: /DATA/AppData/kanban-app/websocket-server.php
              target: /app/websocket-server.php
              bind:
                create_host_path: true
        depends_on:
            - db

    db:
        container_name: kanban-db
        image: mariadb:10.11
        restart: unless-stopped
        networks:
            - kanban-network
        environment:
            MARIADB_ROOT_PASSWORD: kanbanpass
            MARIADB_DATABASE: kanban_db
        volumes:
            - kanban-db-data:/var/lib/mysql

networks:
    default:
        name: kanban-app_default
    kanban-network:
        name: kanban-app_kanban-network
        driver: bridge

volumes:
    kanban-db-data:

x-casaos:
    author: self
    category: self
    hostname: ""
    icon: ""
    index: ""
    is_uncontrolled: false
    port_map: "3001"
    scheme: http
    title:
        custom: Kanban